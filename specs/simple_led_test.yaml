project:
  name: simple_led_test
  title: Simple LED PCB Flow Test
  output_dir: projects/simple_led_test
  artifacts_dir: artifacts
  kicad_major_required: 10
  generated_by: codex-kicad-workflow
  schematic_version: 20230121
  pcb_page_size: A4

kicad:
  footprint_root: /usr/share/kicad/footprints
  symbol_root: /usr/share/kicad/symbols
  symbol_libraries:
    Connector_Generic: /usr/share/kicad/symbols/Connector_Generic.kicad_sym
    Device: /usr/share/kicad/symbols/Device.kicad_sym
  footprint_libraries:
    Connector_PinHeader_2.54mm: /usr/share/kicad/footprints/Connector_PinHeader_2.54mm.pretty
    LED_SMD: /usr/share/kicad/footprints/LED_SMD.pretty
    Resistor_SMD: /usr/share/kicad/footprints/Resistor_SMD.pretty

board:
  size_mm:
    width: 30.0
    height: 18.0
  origin_mm:
    x: 100.0
    y: 100.0
  layers:
    copper: 2
  stackup:
    board_thickness_mm: 1.6
    copper_oz: 1
  fabrication:
    min_track_width_mm: 0.20
    default_signal_width_mm: 0.25
    default_power_width_mm: 0.50
    min_clearance_mm: 0.20
    min_via_diameter_mm: 0.60
    min_via_drill_mm: 0.30
    silk_line_width_mm: 0.15
    silk_text_size_mm: 1.0
    silk_text_thickness_mm: 0.15
    edge_cut_width_mm: 0.10
  net_classes:
    - name: Default
      clearance_mm: 0.20
      track_width_mm: 0.25
      via_diameter_mm: 0.60
      via_drill_mm: 0.30
    - name: power
      clearance_mm: 0.20
      track_width_mm: 0.50
      via_diameter_mm: 0.60
      via_drill_mm: 0.30

manufacturing:
  target: jlcpcb
  jlcpcb:
    references:
      - https://jlcpcb.com/capabilities/pcb-capabilities
      - https://www.jlc.com/portal/vtechnology.html
      - https://jlcpcb.com/help/article/how-to-generate-gerber-and-drill-files-in-kicad-9
      - https://jlcpcb.com/help/article/how-to-generate-bom-and-centroid-files-from-kicad-8
    conservative_rules_mm:
      min_track_width_mm: 0.20
      min_clearance_mm: 0.20
      min_via_diameter_mm: 0.60
      min_via_drill_mm: 0.30
      min_board_width_mm: 10.0
      min_board_height_mm: 10.0
    required_fab_outputs:
      gerbers:
        - F_Cu
        - B_Cu
        - F_Mask
        - B_Mask
        - F_Silkscreen
        - B_Silkscreen
        - Edge_Cuts
      drill: true
      position: true
      bom: true
    package:
      output_dir: artifacts/jlcpcb/simple_led_test
      gerber_drill_zip: simple_led_test_gerber_drill.zip
      manifest: manifest.json
      gerber_tokens:
        - F_Cu
        - B_Cu
        - F_Mask
        - B_Mask
        - F_Silkscreen
        - B_Silkscreen
        - Edge_Cuts
      drill_patterns:
        - "*.drl"
      required_zip_groups:
        top_copper:
          suffixes: [".gtl"]
        bottom_copper:
          suffixes: [".gbl"]
        top_solder_mask:
          suffixes: [".gts"]
        bottom_solder_mask:
          suffixes: [".gbs"]
        top_silkscreen:
          suffixes: [".gto"]
        bottom_silkscreen:
          suffixes: [".gbo"]
        board_outline:
          suffixes: [".gm1", ".gko"]
          name_contains: ["edge_cuts", "outline"]
        drill:
          suffixes: [".drl"]
    assembly:
      enabled: false

