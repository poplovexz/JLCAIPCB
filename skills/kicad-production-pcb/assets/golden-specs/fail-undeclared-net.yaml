benchmark:
  expected_exit: 1
  expected_by_check:
    spec_schema_check.py: 1
    spec_net_graph_check.py: 1
  checks:
    - spec_schema_check.py
    - spec_net_graph_check.py

project:
  name: fail_undeclared_net
  output_dir: projects/fail_undeclared_net
  artifacts_dir: artifacts
  kicad_major_required: 10

kicad:
  symbol_root: /usr/share/kicad/symbols
  footprint_root: /usr/share/kicad/footprints

board:
  size_mm: {width: 30.0, height: 20.0}
  layers: {copper: 2}
  fabrication:
    min_track_width_mm: 0.20
    default_signal_width_mm: 0.25
    default_power_width_mm: 0.50
    min_clearance_mm: 0.20
    min_via_diameter_mm: 0.60
    min_via_drill_mm: 0.30

nets:
  - {name: VIN, class: power}

components:
  - ref: J1
    value: INPUT
    symbol: Connector_Generic:Conn_01x02
    footprint: Connector_PinHeader_2.54mm:PinHeader_1x02_P2.54mm_Vertical
    pads: {"1": VIN, "2": GND}
