benchmark:
  checks:
    - script: requirement_intake_gate.py
      expected_exit: 1
intake:
  project_name: revised_intake_board
  user_intent: Build a revised low-risk indoor prototype.
  input_style: guided
  use_environment: Indoor bench.
  connected_devices: One external device.
  power_source: External low-voltage adapter.
  size_or_mechanical: No known limit.
  manufacturing_intent: Local MVP first.
  success_criteria: The external device responds.
  system_boundary: The board controls an external device.
  failure_consequence: Prototype stops without a known safety hazard.
  desired_end_target: local-mvp
safety_screening:
  level: standard
  hazards: []
  rationale: Low-voltage indoor use.
  blocks_automatic_assumptions: false
evidence_inputs:
  available: []
  requested: []
missing_information:
  must_ask_now: []
  can_defer: []
  blocks_mvp: []
  blocks_production:
    - Final production evidence.
  blocks_order_ready:
    - External manufacturing review evidence.
safe_assumptions:
  - id: safe-revised-mvp
    assumption: Keep the result at local MVP.
    reason: Production details are deferred.
    risk: It is not production-ready.
    stage_allowed: local-mvp
unsafe_assumptions:
  - id: unsafe-revised-production
    unknown: Final production details.
    why_not_guess: They affect manufacturing release.
    required_before: production-package
confirmation:
  status: confirmed
  confirmed_by: user
  intake_revision: 3
  confirmed_revision: 2
  user_response_summary: The user confirmed the previous revision only.
decision:
  current_target: draft-spec
  can_create_spec: true
  can_generate_kicad: false
  can_run_erc_drc: false
  next_action: Reconfirm the revised intake.
