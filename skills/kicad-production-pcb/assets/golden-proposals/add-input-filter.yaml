proposal:
  id: add-input-filter
  description: Add an input bypass capacitor as an additive connectivity batch.

add:
  components:
    - ref: C1
      value: 100n
      symbol: Device:C
      footprint: Capacitor_SMD:C_0603_1608Metric
      datasheet: TODO
      status: golden
      pads: {"1": VIN, "2": GND}
      position_mm: {x: 110.0, y: 115.0, rotation: 0}
  routes:
    - net: VIN
      layer: F.Cu
      width_mm: 0.50
      from: {ref: J1, pad: "1"}
      to: {ref: C1, pad: "1"}
    - net: GND
      layer: F.Cu
      width_mm: 0.50
      from: {ref: J1, pad: "2"}
      to: {ref: C1, pad: "2"}
  connectivity_batches:
    - name: input_filter
      upstream_nets: [VIN, GND]
      provided_nets: []
      required_nets: [VIN, GND]
      components: [C1]
      connections:
        - {net: VIN, pins: ["J1.1", "C1.1"]}
        - {net: GND, pins: ["J1.2", "C1.2"]}

extend:
  expected_net_graph:
    nets:
      VIN:
        pins: ["C1.1"]
      GND:
        pins: ["C1.2"]
