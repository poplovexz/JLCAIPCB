score_weights:
  drc_issue: 100000
  unconnected_item: 100000
  via: 50
  segment_mm: 1
  layer_change: 25

default_limits:
  max_drc_issues: 0
  max_unconnected_items: 0

candidate_defaults:
  attempts: 1
  max_attempts: 8
  timeout_seconds: 900
  max_consecutive_failures: 3
  max_no_improvement: 3
  keep_failed_candidates: false
  accept_only_zero_drc: true
  accept_only_zero_unconnected: true

required_command_fields:
  - run_command

placeholder_fields:
  - candidate
  - attempt
  - seed
  - dsn
  - ses
  - pcb_in
  - pcb_out
  - output_dir
